services:

  ollama:
    image: ollama/ollama:latest
    container_name: meddikte-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h

  app:
    build: .
    container_name: meddikte-app
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - whisper_cache:/root/.cache/huggingface
      - ./exports:/app/exports
      - ./static/uludag_logo.png:/app/static/uludag_logo.png
    environment:
      - WHISPER_MODEL=large-v3-turbo
      - OLLAMA_MODEL=nous-hermes2
      - OLLAMA_URL=http://ollama:11434
      - HOSPITAL_NAME=Bursa Uludağ Üniversitesi Hastanesi
      - HOSPITAL_DEPT=Radyoloji Anabilim Dalı
      - PORT=5050
    depends_on:
      - ollama

volumes:
  ollama_data:
  whisper_cache:
